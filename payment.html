<!DOCTYPE html>
<html>
<head>
<title>Payment</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="glass">
<h2>💳 Payment</h2>

<h3>Order Summary</h3>
<div id="summary"></div>

<input placeholder="Card Number"><br>
<input placeholder="Expiry"><br>
<input placeholder="CVV"><br>

<button onclick="payNow()">Pay Now</button>
<p id="loading"></p>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

cart.forEach(item=>{
    document.getElementById("summary").innerHTML += item.name+" x "+item.qty+"<br>";
    total += item.price * item.qty;
});
document.getElementById("summary").innerHTML += "<br>Total ₹"+total;

function payNow(){
    document.getElementById("loading").innerText="Processing...";
    setTimeout(()=>{
        localStorage.removeItem("cart");
        window.location="success.html";
    },2000);
}
</script>

</body>
</html>
