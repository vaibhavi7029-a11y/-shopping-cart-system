<!DOCTYPE html>
<html>
<head>
<title>Success</title>
<style>
body {
    background:#0f2027;
    color:white;
    text-align:center;
}

.check {
    font-size:80px;
    color:#00ffcc;
    animation:pop 1s ease;
}

@keyframes pop {
    0%{transform:scale(0);}
    100%{transform:scale(1);}
}
</style>
</head>
<body>

<h1 class="check">✔</h1>
<h2>Payment Successful 🎉</h2>
<p>Order placed successfully</p>

</body>
</html>
