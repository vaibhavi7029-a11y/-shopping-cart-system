<!DOCTYPE html>
<html>
<head>
<title>Shop</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🛒 Shopping Cart</h1>

<div class="card">
    <h2>Headphones 🎧</h2>
    <p>₹1500</p>
    <button onclick="addToCart('Headphones',1500)">Add</button>
</div>

<div class="card">
    <h2>Shoes 👟</h2>
    <p>₹2000</p>
    <button onclick="addToCart('Shoes',2000)">Add</button>
</div>

<div class="card">
    <h2>Watch ⌚</h2>
    <p>₹3000</p>
    <button onclick="addToCart('Watch',3000)">Add</button>
</div>

<h2>Your Cart</h2>
<div id="cartItems"></div>

<h3>Total: ₹<span id="total">0</span></h3>

<button onclick="goToPayment()">Proceed to Payment 💳</button>

<script src="script.js"></script>
</body>
</html>
